<!-- Complete Order Modal Start -->
<div class="modal fade" id="orderModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header bg-primary text-white">
        <h5 class="modal-title">Complete Your Order</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        
        <div class="mb-3">
          <h6>Order Summary</h6>
          <div id="cartItemsList">
            <!-- Yahan cart ke products khud aa jayenge -->
          </div>
          <hr>
          <div class="d-flex justify-content-between fw-bold fs-5">
            <span>Total:</span>
            <span id="totalPrice">Rs. 0</span>
          </div>
        </div>

        <div class="mb-3">
          <label for="fullName" class="form-label">Full Name *</label>
          <input type="text" class="form-control" id="fullName" placeholder="Enter your full name" required>
        </div>

        <div class="mb-3">
          <label for="phoneNumber" class="form-label">Phone Number *</label>
          <input type="tel" class="form-control" id="phoneNumber" placeholder="03XXXXXXXXX" required>
        </div>

        <div class="mb-3">
          <label for="city" class="form-label">City *</label>
          <input type="text" class="form-control" id="city" placeholder="e.g. Karachi, Lahore" required>
        </div>

        <div class="mb-3">
          <label for="deliveryAddress" class="form-label">Complete Delivery Address *</label>
          <textarea class="form-control" id="deliveryAddress" rows="2" placeholder="House #, Street, Area" required></textarea>
        </div>

        <div class="mb-3">
          <label for="postalCode" class="form-label">Postal Code *</label>
          <input type="text" class="form-control" id="postalCode" placeholder="e.g. 74000" required>
        </div>

        <div class="mb-3">
          <label for="paymentMethod" class="form-label">Payment Method *</label>
          <select class="form-select" id="paymentMethod" required>
            <option value="" selected disabled>Select payment method</option>
            <option value="Cash on Delivery">Cash on Delivery - COD</option>
            <option value="Easypaisa">Easypaisa</option>
            <option value="JazzCash">JazzCash</option>
            <option value="Bank Transfer">Bank Transfer</option>
          </select>
        </div>

        <div class="mb-3" id="paymentDetails" style="display: none;">
          <div class="alert alert-info p-2">
            <small><strong>Payment Details:</strong><br>
            <span id="paymentText"></span></small>
          </div>
        </div>

        <div class="mb-3">
          <label for="additionalNotes" class="form-label">Additional Notes (Optional)</label>
          <textarea class="form-control" id="additionalNotes" rows="2" placeholder="Any special instructions..."></textarea>
        </div>

      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-success w-100 py-2" onclick="placeOrder()">
          <i class="bi bi-whatsapp"></i> Place Order on WhatsApp
        </button>
      </div>
    </div>
  </div>
</div>

<script>
// Ye function cart ke items ko modal me show karega
function updateOrderModal() {
  let cartList = document.getElementById('cartItemsList');
  let totalElement = document.getElementById('totalPrice');
  let cart = JSON.parse(localStorage.getItem('cart')) || [];
  
  cartList.innerHTML = '';
  let total = 0;
  
  cart.forEach(item => {
    total += item.price * item.quantity;
    cartList.innerHTML += `
      <div class="d-flex justify-content-between mb-1">
        <span>${item.name} x ${item.quantity}</span>
        <span>Rs. ${item.price * item.quantity}</span>
      </div>
    `;
  });
  
  totalElement.innerText = `Rs. ${total}`;
}

// Payment method select karne pe details show karo
document.getElementById('paymentMethod').addEventListener('change', function() {
  let payment = this.value;
  let details = document.getElementById('paymentDetails');
  let text = document.getElementById('paymentText');
  
  if(payment == 'Easypaisa') {
    text.innerHTML = 'Easypaisa Account: 03012800023 <br> Name: Zenvy Tech <br> Payment ke baad screenshot WhatsApp karein';
    details.style.display = 'block';
  } else if(payment == 'JazzCash') {
    text.innerHTML = 'JazzCash Account: 03012800023 <br> Name: Zenvy Tech <br> Payment ke baad screenshot WhatsApp karein';
    details.style.display = 'block';
  } else if(payment == 'Bank Transfer') {
    text.innerHTML = 'Bank: HBL <br> Account #: 123456789 <br> Title: Zenvy Tech <br> Payment ke baad screenshot WhatsApp karein';
    details.style.display = 'block';
  } else {
    details.style.display = 'none';
  }
});

// WhatsApp pe order bhejne ka function - ab dynamic
function placeOrder() {
  let name = document.getElementById('fullName').value;
  let phone = document.getElementById('phoneNumber').value;
  let city = document.getElementById('city').value;
  let address = document.getElementById('deliveryAddress').value;
  let postal = document.getElementById('postalCode').value;
  let payment = document.getElementById('paymentMethod').value;
  let notes = document.getElementById('additionalNotes').value;
  let cart = JSON.parse(localStorage.getItem('cart')) || [];
  
  if(!name || !phone || !city || !address || !postal || !payment){
    alert('Please fill all required fields *');
    return;
  }
  
  if(cart.length === 0){
    alert('Your cart is empty!');
    return;
  }
  
  let productList = '';
  let total = 0;
  cart.forEach((item, index) => {
    productList += `${index + 1}. ${item.name} x ${item.quantity} = Rs. ${item.price * item.quantity} %0A`;
    total += item.price * item.quantity;
  });
  
  let message = `*NEW ORDER - ZENVY TECH* %0A%0A` +
  `*ORDER SUMMARY* %0A${productList}` +
  `*Total: Rs. ${total}* %0A%0A` +
  `*CUSTOMER DETAILS* %0A` +
  `Name: ${name} %0A` +
  `Phone: ${phone} %0A` +
  `City: ${city} %0A` +
  `Address: ${address} %0A` +
  `Postal Code: ${postal} %0A` +
  `Payment Method: ${payment} %0A` +
  `Notes: ${notes || 'None'} %0A%0A` +
  `Please confirm my order. Thank you!`;
  
  window.open(`https://wa.me/923012800023?text=${message}`, '_blank');
}

// Jab modal khule to cart update ho
document.getElementById('orderModal').addEventListener('show.bs.modal', updateOrderModal);
</script>
<!-- Complete Order Modal End -->
