<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zenvy Tech Store</title>

<style>
body{font-family:sans-serif;margin:0;background:#f1f5f9}
header{background:#2563eb;color:white;padding:15px;text-align:center}
.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:15px;padding:20px}
.card{background:white;padding:10px;border-radius:10px;cursor:pointer}
.card img{width:100%;height:150px;object-fit:contain}
.price{color:green;font-weight:bold}
.cart{position:fixed;bottom:20px;right:20px;background:green;color:white;padding:10px;border-radius:50px;cursor:pointer}
button{padding:8px;border:none;background:#2563eb;color:white;border-radius:6px;cursor:pointer}
.filters{text-align:center;margin:10px}
</style>
</head>

<body>

<header>
<h2>Zenvy Tech Store</h2>
</header>

<div class="filters">
<button onclick="filterProducts('all')">All</button>
<button onclick="filterProducts('electronics')">Electronics</button>
<button onclick="filterProducts('home')">Home</button>
<button onclick="filterProducts('beauty')">Beauty</button>
<button onclick="filterProducts('kids')">Kids</button>
</div>

<div class="products" id="productsContainer"></div>

<div class="cart" onclick="checkout()">Cart (<span id="cartCount">0</span>)</div>

<script>

let cart=[]

const products=[
{id:1,name:'Tracing Book',price:700,category:'kids'},
{id:2,name:'Ice Roller',price:600,category:'beauty'},
{id:3,name:'Water Bottle',price:600,category:'home'},
{id:4,name:'Massager',price:1100,category:'beauty'},
{id:5,name:'Laptop Table',price:1800,category:'home'},
{id:6,name:'Earbuds',price:1700,category:'electronics'},
{id:7,name:'Hair Dryer',price:1100,category:'electronics'},
{id:8,name:'Baby Water Mat',price:1100,category:'kids'},
{id:9,name:'Tool Set',price:1600,category:'home'},
{id:10,name:'Perfume',price:260,category:'beauty'},
{id:11,name:'Karaoke Mic',price:1300,category:'electronics'},
{id:12,name:'Airpods',price:2400,category:'electronics'},
{id:13,name:'Kettle',price:2300,category:'home'},
{id:14,name:'Storage Box',price:1200,category:'home'},
{id:15,name:'Gold Serum',price:800,category:'beauty'},
{id:16,name:'Rice Soap',price:500,category:'beauty'},
{id:17,name:'Nails Kit',price:1050,category:'beauty'},
{id:18,name:'Soap Holder',price:400,category:'home'},
{id:19,name:'Grinder',price:2000,category:'home'},
{id:20,name:'Keychain',price:800,category:'home'},
{id:21,name:'Medicine Box',price:950,category:'home'},
{id:22,name:'Watch Set',price:2700,category:'electronics'},
{id:23,name:'Oil Filter',price:1600,category:'home'},
{id:24,name:'Sewing Machine',price:1400,category:'home'},
{id:25,name:'Vacuum Flask',price:1800,category:'home'},
{id:26,name:'Resistance Bands',price:1500,category:'beauty'},
{id:27,name:'Toothbrush Holder',price:800,category:'home'},
{id:28,name:'Spray Fan',price:4200,category:'home'},
{id:29,name:'Desk Organizer',price:1100,category:'home'},
{id:30,name:'Soap Dispenser',price:1800,category:'home'},
{id:31,name:'Chromebook',price:12000,category:'electronics'},
{id:32,name:'Dumpling Maker',price:600,category:'home'}
]

function renderProducts(list){
let html=''
list.forEach(p=>{
html+=`
<div class="card">
<img src="https://via.placeholder.com/150">
<h4>${p.name}</h4>
<p class="price">Rs ${p.price}</p>
<button onclick="addToCart(${p.id})">Add</button>
</div>`
})
document.getElementById('productsContainer').innerHTML=html
}

function filterProducts(cat){
if(cat=='all') renderProducts(products)
else renderProducts(products.filter(p=>p.category==cat))
}

function addToCart(id){
let item=products.find(p=>p.id==id)
cart.push(item)
document.getElementById('cartCount').innerText=cart.length
}

function checkout(){
if(cart.length==0){alert('Cart empty');return}

let msg='Zenvy Order:%0A'
let total=0

cart.forEach((p,i)=>{
msg+=`${i+1}. ${p.name} Rs${p.price}%0A`
total+=p.price
})

msg+=`Total: Rs${total}`

window.open(`https://wa.me/923012800023?text=${msg}`)
}

renderProducts(products)

</script>

</body>
</html>
