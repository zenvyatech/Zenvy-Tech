<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zenvy Tech</title>

<style>
body{margin:0;font-family:Poppins,Arial;background:#f1f5f9}
header{position:fixed;top:0;left:0;right:0;background:#2563eb;color:#fff;padding:15px;display:flex;justify-content:space-between;z-index:100}
nav a{color:#fff;margin:0 10px;text-decoration:none}
.hero{padding:120px 20px 60px;text-align:center;background:#1e40af;color:#fff}
.section{padding:60px 20px}
.products{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:15px}
.card{background:#fff;padding:10px;border-radius:10px;cursor:pointer}
.card img{width:100%;height:150px;object-fit:contain}
.btn{padding:10px 15px;background:#f59e0b;border:none;border-radius:8px;cursor:pointer}
.cart{position:fixed;bottom:20px;right:20px;background:#22c55e;color:#fff;padding:12px;border-radius:50px;cursor:pointer}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#000000aa}
.modal-content{background:#fff;margin:5% auto;padding:20px;width:90%;max-width:600px;border-radius:10px}
.close{float:right;cursor:pointer}
</style>
</head>

<body>

<header>
<div><b>Zenvy Tech</b></div>
<nav>
<a href="#home">Home</a>
<a href="#products">Shop</a>
</nav>
</header>

<section class="hero" id="home">
<h1>Pakistan Online Store</h1>
<p>Best COD Store in Karachi</p>
</section>

<section class="section" id="products">
<h2>Products</h2>
<div id="productsContainer" class="products"></div>
</section>

<div class="cart" onclick="openCart()">Cart (<span id="cartCount">0</span>)</div>

<!-- PRODUCT MODAL -->
<div id="productModal" class="modal">
<div class="modal-content">
<span class="close" onclick="closeProduct()">X</span>
<div id="productDetail"></div>
</div>
</div>

<!-- CART MODAL -->
<div id="cartModal" class="modal">
<div class="modal-content">
<span class="close" onclick="closeCart()">X</span>
<h3>Checkout</h3>

<div id="cartItems"></div>
<h4>Total: Rs <span id="totalPrice">0</span></h4>

<input id="name" placeholder="Name"><br><br>
<input id="phone" placeholder="Phone"><br><br>
<textarea id="address" placeholder="Address"></textarea><br><br>

<button class="btn" onclick="placeOrder()">Order on WhatsApp</button>
</div>
</div>

<script>
let cart = [];

const products = [
{id:1,name:"Ice Roller",price:600,img:"https://via.placeholder.com/200"},
{id:2,name:"Hair Dryer",price:1100,img:"https://via.placeholder.com/200"},
{id:3,name:"Earbuds",price:1700,img:"https://via.placeholder.com/200"},
{id:4,name:"Massage Gun",price:1200,img:"https://via.placeholder.com/200"}
];

// render products
function loadProducts(){
let html="";
products.forEach(p=>{
html+=`
<div class="card" onclick="openProduct(${p.id})">
<img src="${p.img}">
<h4>${p.name}</h4>
<p>Rs ${p.price}</p>
<button class="btn" onclick="event.stopPropagation(); addToCart(${p.id})">Add</button>
</div>`;
});
document.getElementById("productsContainer").innerHTML=html;
}

// open product
function openProduct(id){
let p=products.find(x=>x.id===id);
document.getElementById("productDetail").innerHTML=`
<h2>${p.name}</h2>
<img src="${p.img}" style="width:100%">
<p>Price: Rs ${p.price}</p>
<button class="btn" onclick="addToCart(${p.id})">Add to Cart</button>
`;
document.getElementById("productModal").style.display="block";
}

function closeProduct(){
document.getElementById("productModal").style.display="none";
}

// cart
function addToCart(id){
let p=products.find(x=>x.id===id);
cart.push(p);
updateCart();
}

function updateCart(){
document.getElementById("cartCount").innerText=cart.length;
}

// open cart
function openCart(){
let html="";
let total=0;

cart.forEach((p,i)=>{
total+=p.price;
html+=`<p>${p.name} - Rs ${p.price}</p>`;
});

document.getElementById("cartItems").innerHTML=html;
document.getElementById("totalPrice").innerText=total;
document.getElementById("cartModal").style.display="block";
}

function closeCart(){
document.getElementById("cartModal").style.display="none";
}

// order whatsapp
function placeOrder(){
let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let address=document.getElementById("address").value;

let items="";
let total=0;

cart.forEach(p=>{
items+=p.name+" - Rs "+p.price+"\n";
total+=p.price;
});

let msg=
`Order:\n${items}\nTotal: Rs ${total}\n\nName:${name}\nPhone:${phone}\nAddress:${address}`;

let url="https://wa.me/923012800023?text="+encodeURIComponent(msg);
window.open(url,"_blank");
}

loadProducts();
</script>

</body>
</html>
